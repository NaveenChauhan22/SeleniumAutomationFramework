# CI Pipeline
# Runs on every push to main/develop and on every pull request targeting those branches.
# Pull requests execute smoke tests only (Category=High&Category=Smoke) for fast feedback.
# Push to main/develop executes the full test suite on all supported browsers.
# NOTE: ci_report_fix branch is temporarily included for report-fix validation only.
# TODO: Remove ci_report_fix from triggers once merged and validated.

name: CI

on:
  push:
    branches: [main, develop, ci_report_fix]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - full

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  BUILD_CONFIGURATION: 'Release'

jobs:
  # ── 1. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

  # ── 2. API Tests ──────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Run API Tests
        env:
          TEST_SHARED_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_SHARED_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_USER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_ORGANIZER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_ORGANIZER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_VIEWER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_VIEWER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          MANUAL_SUITE: ${{ github.event.inputs.suite }}
        run: |
          if [ -n "$MANUAL_SUITE" ]; then
            SUITE="$MANUAL_SUITE"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            SUITE="smoke"
          elif [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "develop" ]; then
            SUITE="full"
          else
            SUITE="smoke"
          fi

          if [ "$SUITE" = "smoke" ]; then
            COMMON_FILTER="Category=High&Category=Smoke"
          else
            COMMON_FILTER=""
          fi

          ROLES=(user admin organizer viewer)
          AVAILABLE_ROLES=()
          for role in "${ROLES[@]}"; do
            prefix=$(echo "$role" | tr '[:lower:]' '[:upper:]')
            email_var="TEST_${prefix}_EMAIL"
            password_var="TEST_${prefix}_PASSWORD"
            email_value="${!email_var}"
            password_value="${!password_var}"
            if [ -n "$email_value" ] && [ -n "$password_value" ]; then
              AVAILABLE_ROLES+=("$role")
            fi
          done

          if [ ${#AVAILABLE_ROLES[@]} -eq 0 ]; then
            echo "::error::No role credentials configured. Set at least one TEST_<ROLE>_EMAIL/TEST_<ROLE>_PASSWORD pair."
            exit 1
          fi

          echo "Running API suite: $SUITE"
          echo "Available roles: ${AVAILABLE_ROLES[*]}"

          DEFAULT_ROLE="${AVAILABLE_ROLES[0]}"
          echo "Using TEST_EXECUTION_ROLE=$DEFAULT_ROLE for this API run"

          if [ -n "$COMMON_FILTER" ]; then
            echo "Running API tests with filter: $COMMON_FILTER"
            TEST_EXECUTION_ROLE="$DEFAULT_ROLE" dotnet test tests/APITests/APITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }} --filter "$COMMON_FILTER"
          else
            echo "Running full API suite (no filter)"
            TEST_EXECUTION_ROLE="$DEFAULT_ROLE" dotnet test tests/APITests/APITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }}
          fi

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: reports/allure-results/
          retention-days: 7

  # ── 3. UI Tests (cross-browser matrix) ───────────────────────────────────────
  ui-tests:
    name: UI Tests — ${{ matrix.browser }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Run UI Tests — ${{ matrix.browser }}
        env:
          TEST_SHARED_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_SHARED_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_USER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_ORGANIZER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_ORGANIZER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_VIEWER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_VIEWER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TestSettings__Browser: ${{ matrix.browser }}
          TestSettings__Headless: 'true'
        run: |
          # CI requirement: always run the full UI suite.
          COMMON_FILTER=""

          ROLES=(user admin organizer viewer)
          AVAILABLE_ROLES=()
          for role in "${ROLES[@]}"; do
            prefix=$(echo "$role" | tr '[:lower:]' '[:upper:]')
            email_var="TEST_${prefix}_EMAIL"
            password_var="TEST_${prefix}_PASSWORD"
            email_value="${!email_var}"
            password_value="${!password_var}"
            if [ -n "$email_value" ] && [ -n "$password_value" ]; then
              AVAILABLE_ROLES+=("$role")
            fi
          done

          if [ ${#AVAILABLE_ROLES[@]} -eq 0 ]; then
            echo "::error::No role credentials configured. Set at least one TEST_<ROLE>_EMAIL/TEST_<ROLE>_PASSWORD pair."
            exit 1
          fi

          echo "Running full UI suite on browser ${{ matrix.browser }}"
          echo "Available roles: ${AVAILABLE_ROLES[*]}"

          DEFAULT_ROLE="${AVAILABLE_ROLES[0]}"
          echo "Using TEST_EXECUTION_ROLE=$DEFAULT_ROLE for this UI run"

          if [ -n "$COMMON_FILTER" ]; then
            echo "Running UI tests with filter: $COMMON_FILTER"
            TEST_EXECUTION_ROLE="$DEFAULT_ROLE" dotnet test tests/UITests/UITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }} --filter "$COMMON_FILTER"
          else
            echo "Running full UI suite (no filter)"
            TEST_EXECUTION_ROLE="$DEFAULT_ROLE" dotnet test tests/UITests/UITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }}
          fi

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui-${{ matrix.browser }}
          path: reports/allure-results/
          retention-days: 7

  # ── 4. Allure Report (combined across all jobs) ───────────────────────────────
  allure-report:
    name: Allure Report
    needs: [api-tests, ui-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        run: |
          rm -rf .ci/allure-results-merged .ci/allure-report
          mkdir -p .ci/allure-results-merged .ci/allure-report

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: .ci/allure-results-merged/
          merge-multiple: true

      - name: Restore previous Allure history
        id: allure-history-restore
        uses: actions/cache/restore@v4
        with:
          path: .ci/allure-history
          key: ${{ runner.os }}-allure-history-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-allure-history-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Inject history into merged results
        run: |
          if [ -d ".ci/allure-history/history" ]; then
            mkdir -p .ci/allure-results-merged/history
            cp -R .ci/allure-history/history/. .ci/allure-results-merged/history/
            echo "Restored history into merged results."
          else
            echo "No previous history cache found."
          fi

      - name: Install Allure CLI
        run: |
          wget -q -O allure.tgz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          sudo tar -xzf allure.tgz -C /opt/
          sudo ln -sf /opt/allure-2.27.0/bin/allure /usr/local/bin/allure

      - name: Generate Allure Report
        run: |
          echo "Merged Allure result files:"
          find .ci/allure-results-merged -type f | wc -l
          allure generate .ci/allure-results-merged/ -o .ci/allure-report/ --clean --single-file

      - name: Generate Allure Report (history snapshot)
        run: |
          rm -rf .ci/allure-report-history
          allure generate .ci/allure-results-merged/ -o .ci/allure-report-history/ --clean

      - name: Prepare history cache payload
        run: |
          rm -rf .ci/allure-history
          mkdir -p .ci/allure-history
          if [ -d ".ci/allure-report-history/history" ]; then
            cp -R .ci/allure-report-history/history .ci/allure-history/history
            echo "Prepared history cache payload from generated report."
          else
            echo "No history directory produced by report generation."
          fi

      - name: Save updated Allure history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .ci/allure-history
          key: ${{ runner.os }}-allure-history-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload Merged Allure Raw Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-merged
          path: .ci/allure-results-merged/
          retention-days: 30

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: .ci/allure-report/
          retention-days: 30
