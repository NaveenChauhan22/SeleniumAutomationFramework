# Nightly Pipeline
# Runs the full test suite every night at 02:00 UTC across all supported browsers.
# Can also be triggered manually via workflow_dispatch — optionally limit to smoke tests.

name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - smoke

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  BUILD_CONFIGURATION: 'Release'

jobs:
  # ── 1. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

  # ── 2. API Tests ──────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Prepare Allure Results Directory
        run: |
          rm -rf .ci/allure-results-api
          mkdir -p .ci/allure-results-api

      - name: Run API Tests
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          SUITE: ${{ github.event.inputs.suite || 'full' }}
          ALLURE_RESULTS_DIRECTORY: ${{ github.workspace }}/.ci/allure-results-api
        run: |
          if [ "$SUITE" = "smoke" ]; then
            dotnet test tests/APITests/APITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }} --filter "Category=High&Category=Smoke"
          else
            dotnet test tests/APITests/APITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }}
          fi

          echo "API Allure result files:"
          find .ci/allure-results-api -type f | wc -l

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: .ci/allure-results-api/
          retention-days: 7

  # ── 3. UI Tests (cross-browser matrix, ubuntu + windows for Edge) ─────────────
  ui-tests:
    name: UI Tests — ${{ matrix.browser }} (${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            os: ubuntu-latest
          - browser: firefox
            os: ubuntu-latest
          - browser: edge
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Cache NuGet packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: $env:USERPROFILE\.nuget\packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Prepare Allure Results Directory
        shell: pwsh
        run: |
          $path = ".ci/allure-results-ui-${{ matrix.browser }}"
          if (Test-Path $path) { Remove-Item $path -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $path | Out-Null

      - name: Run UI Tests — ${{ matrix.browser }} (Linux)
        if: runner.os == 'Linux'
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TestSettings__Browser: ${{ matrix.browser }}
          TestSettings__Headless: 'true'
          SUITE: ${{ github.event.inputs.suite || 'full' }}
          ALLURE_RESULTS_DIRECTORY: ${{ github.workspace }}/.ci/allure-results-ui-${{ matrix.browser }}
        run: |
          # Smoke runs use smoke filter; full runs execute all UI tests.
          if [ "$SUITE" = "smoke" ]; then
            FILTER="Category=High&Category=Smoke"
          else
            FILTER=""
          fi

          echo "Running UI suite: $SUITE on browser ${{ matrix.browser }}, filter: ${FILTER:-none}"
          if [ -n "$FILTER" ]; then
            dotnet test tests/UITests/UITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }} --filter "$FILTER"
          else
            dotnet test tests/UITests/UITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }}
          fi

          echo "UI (${{ matrix.browser }}) Allure result files:"
          find .ci/allure-results-ui-${{ matrix.browser }} -type f | wc -l

      - name: Run UI Tests — ${{ matrix.browser }} (Windows)
        if: runner.os == 'Windows'
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TestSettings__Browser: ${{ matrix.browser }}
          TestSettings__Headless: 'true'
          ALLURE_RESULTS_DIRECTORY: ${{ github.workspace }}\.ci\allure-results-ui-${{ matrix.browser }}
        shell: pwsh
        run: |
          $suite = "${{ github.event.inputs.suite }}"
          if (-not $suite) { $suite = "full" }
          # Smoke runs use smoke filter; full runs execute all UI tests.
          if ($suite -eq "smoke") {
            $filter = "Category=High&Category=Smoke"
          } else {
            $filter = ""
          }

          Write-Host "Running UI suite: $suite on browser ${{ matrix.browser }}, filter: $(if($filter){$filter}else{'none'})"
          if ($filter) {
            dotnet test tests/UITests/UITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }} --filter "$filter"
          } else {
            dotnet test tests/UITests/UITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }}
          }

          Write-Host "UI (${{ matrix.browser }}) Allure result files:"
          (Get-ChildItem ".ci/allure-results-ui-${{ matrix.browser }}" -Recurse -File | Measure-Object).Count

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui-${{ matrix.browser }}
          path: .ci/allure-results-ui-${{ matrix.browser }}/
          retention-days: 7

  # ── 4. Allure Report (combined across all jobs) ───────────────────────────────
  allure-report:
    name: Allure Report
    needs: [api-tests, ui-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Prepare merged output directories
        run: |
          rm -rf .ci/allure-results-merged .ci/allure-report
          mkdir -p .ci/allure-results-merged .ci/allure-report

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: .ci/allure-results-merged/
          merge-multiple: true

      - name: Restore previous Allure history
        id: allure-history-restore
        uses: actions/cache/restore@v4
        with:
          path: .ci/allure-history
          key: ${{ runner.os }}-allure-history-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-allure-history-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Inject history into merged results
        run: |
          if [ -d ".ci/allure-history/history" ]; then
            mkdir -p .ci/allure-results-merged/history
            cp -R .ci/allure-history/history/. .ci/allure-results-merged/history/
            echo "Restored history into merged results."
          else
            echo "No previous history cache found."
          fi

      - name: Install Allure CLI
        run: |
          wget -q -O allure.tgz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          sudo tar -xzf allure.tgz -C /opt/
          sudo ln -sf /opt/allure-2.27.0/bin/allure /usr/local/bin/allure

      - name: Generate Allure Report
        run: |
          echo "Merged Allure result files:"
          find .ci/allure-results-merged -type f | wc -l
          allure generate .ci/allure-results-merged/ -o .ci/allure-report/ --clean --single-file

      - name: Generate Allure Report (history snapshot)
        run: |
          rm -rf .ci/allure-report-history
          allure generate .ci/allure-results-merged/ -o .ci/allure-report-history/ --clean

      - name: Prepare history cache payload
        run: |
          rm -rf .ci/allure-history
          mkdir -p .ci/allure-history
          if [ -d ".ci/allure-report-history/history" ]; then
            cp -R .ci/allure-report-history/history .ci/allure-history/history
            echo "Prepared history cache payload from generated report."
          else
            echo "No history directory produced by report generation."
          fi

      - name: Save updated Allure history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .ci/allure-history
          key: ${{ runner.os }}-allure-history-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload Merged Allure Raw Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-merged-nightly
          path: .ci/allure-results-merged/
          retention-days: 30

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-nightly
          path: .ci/allure-report/
          retention-days: 30
