# Nightly Pipeline
# Runs the full test suite every night at 02:00 UTC across all supported browsers.
# Can also be triggered manually via workflow_dispatch — optionally limit to smoke tests.

name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - smoke

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  BUILD_CONFIGURATION: 'Release'

jobs:
  # ── 1. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

  # ── 2. API Tests ──────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Run API Tests
        env:
          TEST_SHARED_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_SHARED_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_USER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_ORGANIZER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_ORGANIZER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_VIEWER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_VIEWER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          SUITE: ${{ github.event.inputs.suite || 'full' }}
        run: |
          if [ "$SUITE" = "smoke" ]; then
            COMMON_FILTER="Category=High&Category=Smoke"
          else
            COMMON_FILTER=""
          fi

          ROLES=(user admin organizer viewer)
          AVAILABLE_ROLES=()
          for role in "${ROLES[@]}"; do
            prefix=$(echo "$role" | tr '[:lower:]' '[:upper:]')
            email_var="TEST_${prefix}_EMAIL"
            password_var="TEST_${prefix}_PASSWORD"
            email_value="${!email_var}"
            password_value="${!password_var}"
            if [ -n "$email_value" ] && [ -n "$password_value" ]; then
              AVAILABLE_ROLES+=("$role")
            fi
          done

          if [ ${#AVAILABLE_ROLES[@]} -eq 0 ]; then
            echo "::error::No role credentials configured. Set at least one TEST_<ROLE>_EMAIL/TEST_<ROLE>_PASSWORD pair."
            exit 1
          fi

          echo "Running API suite: $SUITE"
          echo "Available roles: ${AVAILABLE_ROLES[*]}"

          DEFAULT_ROLE="${AVAILABLE_ROLES[0]}"
          echo "Using TEST_EXECUTION_ROLE=$DEFAULT_ROLE for this API run"

          if [ -n "$COMMON_FILTER" ]; then
            echo "Running API tests with filter: $COMMON_FILTER"
            TEST_EXECUTION_ROLE="$DEFAULT_ROLE" dotnet test tests/APITests/APITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }} --filter "$COMMON_FILTER"
          else
            echo "Running full API suite (no filter)"
            TEST_EXECUTION_ROLE="$DEFAULT_ROLE" dotnet test tests/APITests/APITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }}
          fi

      - name: Prepare API Allure Artifacts
        if: always()
        run: |
          mkdir -p .ci/allure-results-api
          rm -f .ci/allure-results-api/executor.json
          echo "API Allure result files:"
          find .ci/allure-results-api -type f | wc -l || echo "0"

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: .ci/allure-results-api/
          retention-days: 7

  # ── 3. UI Tests (cross-browser matrix, ubuntu + windows for Edge) ─────────────
  ui-tests:
    name: UI Tests — ${{ matrix.browser }} (${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            os: ubuntu-latest
          - browser: firefox
            os: ubuntu-latest
          - browser: edge
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Cache NuGet packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: $env:USERPROFILE\.nuget\packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Run UI Tests — ${{ matrix.browser }} (Linux)
        if: runner.os == 'Linux'
        env:
          TEST_SHARED_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_SHARED_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_USER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_ORGANIZER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_ORGANIZER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_VIEWER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_VIEWER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TestSettings__Browser: ${{ matrix.browser }}
          TestSettings__Headless: 'true'
          SUITE: ${{ github.event.inputs.suite || 'full' }}
          ALLURE_RESULTS_DIRECTORY: ${{ github.workspace }}/.ci/allure-results-ui-${{ matrix.browser }}
        run: |
          if [ "$SUITE" = "smoke" ]; then
            COMMON_FILTER="Category=High&Category=Smoke"
          else
            COMMON_FILTER=""
          fi

          ROLES=(user admin organizer viewer)
          AVAILABLE_ROLES=()
          for role in "${ROLES[@]}"; do
            prefix=$(echo "$role" | tr '[:lower:]' '[:upper:]')
            email_var="TEST_${prefix}_EMAIL"
            password_var="TEST_${prefix}_PASSWORD"
            email_value="${!email_var}"
            password_value="${!password_var}"
            if [ -n "$email_value" ] && [ -n "$password_value" ]; then
              AVAILABLE_ROLES+=("$role")
            fi
          done

          if [ ${#AVAILABLE_ROLES[@]} -eq 0 ]; then
            echo "::error::No role credentials configured. Set at least one TEST_<ROLE>_EMAIL/TEST_<ROLE>_PASSWORD pair."
            exit 1
          fi

          echo "Running UI suite: $SUITE on browser ${{ matrix.browser }}"
          echo "Available roles: ${AVAILABLE_ROLES[*]}"

          DEFAULT_ROLE="${AVAILABLE_ROLES[0]}"
          echo "Using TEST_EXECUTION_ROLE=$DEFAULT_ROLE for this UI run"

          if [ -n "$COMMON_FILTER" ]; then
            echo "Running UI tests with filter: $COMMON_FILTER"
            TEST_EXECUTION_ROLE="$DEFAULT_ROLE" dotnet test tests/UITests/UITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }} --filter "$COMMON_FILTER"
          else
            echo "Running full UI suite (no filter)"
            TEST_EXECUTION_ROLE="$DEFAULT_ROLE" dotnet test tests/UITests/UITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }}
          fi

      - name: Prepare UI Allure Artifacts (Linux)
        if: always() && runner.os == 'Linux'
        run: |
          mkdir -p .ci/allure-results-ui-${{ matrix.browser }}
          rm -f .ci/allure-results-ui-${{ matrix.browser }}/executor.json
          echo "UI (${{ matrix.browser }}) Allure result files:"
          find .ci/allure-results-ui-${{ matrix.browser }} -type f | wc -l || echo "0"

      - name: Run UI Tests — ${{ matrix.browser }} (Windows)
        if: runner.os == 'Windows'
        env:
          TEST_SHARED_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_SHARED_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_USER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_ORGANIZER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_ORGANIZER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TEST_VIEWER_EMAIL: ${{ secrets.TEST_SHARED_EMAIL }}
          TEST_VIEWER_PASSWORD: ${{ secrets.TEST_SHARED_PASSWORD }}
          TestSettings__Browser: ${{ matrix.browser }}
          TestSettings__Headless: 'true'
          ALLURE_RESULTS_DIRECTORY: ${{ github.workspace }}\.ci\allure-results-ui-${{ matrix.browser }}
        shell: pwsh
        run: |
          $suite = "${{ github.event.inputs.suite }}"
          if (-not $suite) { $suite = "full" }
          if ($suite -eq "smoke") {
            $commonFilter = "Category=High&Category=Smoke"
          } else {
            $commonFilter = ""
          }

          $roles = @('user', 'admin', 'organizer', 'viewer')
          $availableRoles = @()
          foreach ($role in $roles) {
            $prefix = $role.ToUpperInvariant()
            $email = [Environment]::GetEnvironmentVariable("TEST_${prefix}_EMAIL")
            $password = [Environment]::GetEnvironmentVariable("TEST_${prefix}_PASSWORD")
            if (-not [string]::IsNullOrWhiteSpace($email) -and -not [string]::IsNullOrWhiteSpace($password)) {
              $availableRoles += $role
            }
          }

          if ($availableRoles.Count -eq 0) {
            throw "No role credentials configured. Set at least one TEST_<ROLE>_EMAIL/TEST_<ROLE>_PASSWORD pair."
          }

          Write-Host "Running UI suite: $suite on browser ${{ matrix.browser }}"
          Write-Host "Available roles: $($availableRoles -join ', ')"

          $defaultRole = $availableRoles[0]
          Write-Host "Using TEST_EXECUTION_ROLE=$defaultRole for this UI run"
          $env:TEST_EXECUTION_ROLE = $defaultRole

          if ($commonFilter) {
            Write-Host "Running UI tests with filter: $commonFilter"
            dotnet test tests/UITests/UITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }} --filter "$commonFilter"
          } else {
            Write-Host "Running full UI suite (no filter)"
            dotnet test tests/UITests/UITests.csproj --no-build --configuration ${{ env.BUILD_CONFIGURATION }}
          }

      - name: Prepare UI Allure Artifacts (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $path = ".ci/allure-results-ui-${{ matrix.browser }}"
          New-Item -ItemType Directory -Force -Path $path | Out-Null
          Remove-Item -Path (Join-Path $path "executor.json") -Force -ErrorAction SilentlyContinue
          Write-Host "UI (${{ matrix.browser }}) Allure result files:"
          (Get-ChildItem $path -Recurse -File | Measure-Object).Count

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui-${{ matrix.browser }}
          path: .ci/allure-results-ui-${{ matrix.browser }}/
          retention-days: 7

  # ── 4. Allure Report (combined across all jobs) ───────────────────────────────
  allure-report:
    name: Allure Report
    needs: [api-tests, ui-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Prepare merged output directories
        run: |
          rm -rf .ci/allure-results-merged .ci/allure-report
          mkdir -p .ci/allure-results-merged .ci/allure-report

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: .ci/allure-results-merged/
          merge-multiple: true

      - name: Restore previous Allure history
        id: allure-history-restore
        uses: actions/cache/restore@v4
        with:
          path: .ci/allure-history
          key: ${{ runner.os }}-allure-history-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-allure-history-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Inject history into merged results
        run: |
          if [ -d ".ci/allure-history/history" ]; then
            mkdir -p .ci/allure-results-merged/history
            cp -R .ci/allure-history/history/. .ci/allure-results-merged/history/
            echo "Restored history into merged results."
          else
            echo "No previous history cache found."
          fi

      - name: Normalize executor metadata for nightly run
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cat > .ci/allure-results-merged/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "reportName": "Selenium Automation Framework Allure Report - Run #${GITHUB_RUN_NUMBER}",
            "buildName": "Run #${GITHUB_RUN_NUMBER}",
            "buildOrder": ${GITHUB_RUN_NUMBER},
            "buildUrl": "${RUN_URL}",
            "reportUrl": "${RUN_URL}",
            "description": "${GITHUB_WORKFLOW} (attempt ${GITHUB_RUN_ATTEMPT})"
          }
          EOF

      - name: Install Allure CLI
        run: |
          wget -q -O allure.tgz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          sudo tar -xzf allure.tgz -C /opt/
          sudo ln -sf /opt/allure-2.27.0/bin/allure /usr/local/bin/allure

      - name: Generate Allure Report
        run: |
          echo "Merged Allure result files:"
          find .ci/allure-results-merged -type f | wc -l
          allure generate .ci/allure-results-merged/ -o .ci/allure-report/ --clean --single-file

      - name: Generate Allure Report (history snapshot)
        run: |
          rm -rf .ci/allure-report-history
          allure generate .ci/allure-results-merged/ -o .ci/allure-report-history/ --clean

      - name: Prepare history cache payload
        run: |
          rm -rf .ci/allure-history
          mkdir -p .ci/allure-history
          if [ -d ".ci/allure-report-history/history" ]; then
            cp -R .ci/allure-report-history/history .ci/allure-history/history
            echo "Prepared history cache payload from generated report."
          else
            echo "No history directory produced by report generation."
          fi

      - name: Save updated Allure history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .ci/allure-history
          key: ${{ runner.os }}-allure-history-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload Merged Allure Raw Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-merged-nightly
          path: .ci/allure-results-merged/
          retention-days: 30

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-nightly
          path: .ci/allure-report/
          retention-days: 30
